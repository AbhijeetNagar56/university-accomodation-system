
services:
  database:
    container_name: udba_mysql2
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: university

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    secrets:
      - mysql_root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - udba

  app:
    image: ghcr.io/abhijeetnagar56/university-dba:latest

    environment:
      PORT: 3000
      SESSION_SECRET: your-secret
      ADMIN_USER: admin
      ADMIN_PASS: admin123
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: university
      DB_USER: root
      DB_PASSWORD_FILE: /run/secrets/mysql_root_password

    secrets:
      - mysql_root_password

    depends_on:
       - database

    ports:
      - "3000:3000"
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - udba

secrets:
  mysql_root_password:
    file: ./db_pass.txt

networks:
  udba:

volumes:
  mysql_data:
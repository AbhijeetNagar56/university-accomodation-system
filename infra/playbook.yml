---
- name: Configure Application Server and Launch Docker Stack
  hosts: all
  become: true
  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisite packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
        state: present

    - name: Create directory for Docker keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker official GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker APT repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu jammy stable"
        state: present
        filename: docker

    - name: Install Docker Engine and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create deployment application directory
      file:
        path: /app
        state: directory
        mode: '0755'
    - name: Create database password file on remote server
      ansible.builtin.copy:
        content: "securepass"
        dest: /app/db_pass.txt
        mode: '0600'

    - name: Copy Compose configuration to host target
      copy:
        src: ../compose.yaml
        dest: /app/compose.yaml

    - name: Launch application containers via Docker Compose
      command: docker compose -f /app/compose.yaml up -d
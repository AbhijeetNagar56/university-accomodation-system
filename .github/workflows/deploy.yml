name: Monorepo CI/CD Pipeline

on:
  push:
    branches:
      - main # Triggers when code pushes to your primary branch

permissions:
  contents: read
  packages: write # Necessary to publish images to ghcr.io

jobs:
  # ==========================================
  # JOB 1: BACKEND PIPELINE
  # ==========================================
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install & Test
        run: |
          cd backend
          npm install
          # Skip test execution if your package.json script still throws errors by default
          # npm test 

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/abhijeetnagar56/university-accomodation-system-backend:latest
            ghcr.io/abhijeetnagar56/university-accomodation-system-backend:${{ github.sha }}

  # ==========================================
  # JOB 2: FRONTEND PIPELINE
  # ==========================================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Production Assets (Vite)
        env:
          # This pulls your production URL from GitHub Secrets and injects it into Vite
          VITE_API_BASE_URL: ${{ secrets.PRODUCTION_BACKEND_URL }}
        run: |
          cd frontend
          npm run build # Vite will find the env var above and bake it into the /dist files

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/abhijeetnagar56/university-accomodation-system-frontend:latest
            ghcr.io/abhijeetnagar56/university-accomodation-system-frontend:${{ github.sha }}

  # ==========================================
  # JOB 3: DEPLOYMENT TRIGGER
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: [backend, frontend] # Only triggers if BOTH image builds successfully complete
    steps:
      - name: Trigger Render Backend Redeploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_WEBHOOK_URL_BACKEND }}"

      - name: Trigger Render Frontend Redeploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_WEBHOOK_URL_FRONTEND }}"

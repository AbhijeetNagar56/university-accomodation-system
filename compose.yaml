services:
  database:
    container_name: uas_db
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: university

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    secrets:
      - mysql_root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - uas-network

  backend:
    container_name: uas-backend
    image: ghcr.io/abhijeetnagar56/university-accomodation-system-backend:latest
    environment:
      SESSION_SECRET: your-secret
      ADMIN_USER: admin
      ADMIN_PASS: admin123
      FRONTEND_URL: http://localhost:8080
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: university
      DB_USER: root
      DB_PASSWORD_FILE: /run/secrets/mysql_root_password
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - uas-network
    secrets:
      - mysql_root_password

  frontend:
    container_name: uas-frontend
    image: ghcr.io/abhijeetnagar56/university-accomodation-system-frontend:latest
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - uas-network

secrets:
  mysql_root_password:
    file: ./db_pass.txt

networks:
  uas-network:

volumes:
  mysql_data: